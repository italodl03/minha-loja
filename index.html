<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Vitrine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin-bottom:10px;
}

#pesquisa{
    width:90%;
    max-width:500px;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

#produtos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.nome{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.preco{
    color:green;
    font-size:20px;
    margin-bottom:10px;
}

.botao{
    display:block;
    text-align:center;
    background:#ff6600;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:8px;
}

#vazio{
    text-align:center;
    padding:40px;
    color:#777;
    font-size:18px;
}
</style>
</head>

<body>

<header>
    <h1>🛒 Minha Vitrine</h1>

    <input
        type="text"
        id="pesquisa"
        placeholder="Pesquisar produto..."
        onkeyup="filtrarProdutos()">
</header>

<div id="vazio">
    Nenhum produto cadastrado.
</div>

<div id="produtos"></div>

<script>

let produtos = [
  {
    "nome": "Camiseta masculina casual de verão com estampa da cruz ortodoxa oriental e oração de Jesus. 100% algodão, gola redonda, manga curta. Marca: Grunt Streetwear.",
    "preco": "R$ 66,39",
    "imagem": "//ae01.alicdn.com/kf/S0f07d8fa05114877a527c1e4f93c053dL.jpg_350x350.jpg",
    "link": "https://s.click.aliexpress.com/e/_c4VtoJjn"
  }
];

let listaProdutos = produtos || [];

if(listaProdutos.length > 0){
    document.getElementById("vazio").style.display = "none";
}

mostrarProdutos(listaProdutos);

function mostrarProdutos(produtos){

    const container = document.getElementById("produtos");

    container.innerHTML = "";

    produtos.forEach(produto => {

        container.innerHTML += `
        <div class="card">

            <img src="${produto.imagem}" alt="${produto.nome}">

            <div class="info">

                <div class="nome">${produto.nome}</div>

                <div class="preco">${produto.preco || ""}</div>

                <a class="botao" href="${produto.link}" target="_blank">
                    Comprar
                </a>

            </div>

        </div>
        `;
    });

}

function filtrarProdutos(){

    const texto =
        document.getElementById("pesquisa")
        .value
        .toLowerCase();

    const filtrados = listaProdutos.filter(p =>
        p.nome.toLowerCase().includes(texto)
    );

    mostrarProdutos(filtrados);

}

</script>

</body>
</html>
