<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gerador de QR Code Pix - Mercado Pago</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #F0F2F5 0%, #E4E7EC 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .header {
            background: #009EE3;
            padding: 1.5rem 2rem;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.85;
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .content {
            padding: 2rem 1.8rem 2rem 1.8rem;
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        label {
            font-weight: 600;
            color: #1A1F36;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .amount-input-wrapper {
            display: flex;
            align-items: center;
            background: #F9FAFB;
            border-radius: 2rem;
            border: 1.5px solid #E2E8F0;
            transition: all 0.2s;
            padding: 0 8px;
        }

        .amount-input-wrapper:focus-within {
            border-color: #009EE3;
            box-shadow: 0 0 0 3px rgba(0, 158, 227, 0.2);
        }

        .currency-symbol {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1A2C3E;
            padding-left: 12px;
            background: #F9FAFB;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.2rem;
            font-weight: 500;
            border: none;
            background: transparent;
            outline: none;
            font-family: monospace;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        button {
            background: #009EE3;
            width: 100%;
            border: none;
            padding: 15px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        button:hover {
            background: #0077B3;
            transform: scale(0.98);
        }

        .qr-container {
            margin-top: 32px;
            background: #FFFFFF;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 1px solid #EFF3F8;
            transition: all 0.3s ease;
        }

        .qr-placeholder {
            background: #F8FAFE;
            border-radius: 24px;
            padding: 20px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background: white;
            padding: 12px;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            max-width: 100%;
            height: auto;
        }

        .pix-copy-area {
            margin-top: 22px;
            background: #F1F5F9;
            border-radius: 2rem;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .pix-code {
            font-size: 0.75rem;
            word-break: break-all;
            font-family: monospace;
            color: #1F2A44;
            max-height: 50px;
            overflow-y: auto;
            text-align: left;
            flex: 1;
        }

        .copy-btn {
            background: #1A2C3E;
            padding: 8px 20px;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
            color: white;
            cursor: pointer;
            width: auto;
            margin-top: 0;
            box-shadow: none;
        }

        .copy-btn:hover {
            background: #0F1A2A;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            background: #FEF9E3;
            border-left: 5px solid #F5B042;
            padding: 12px 16px;
            border-radius: 1.5rem;
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: #8E6100;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #5B6E8C;
            border-top: 1px solid #EDF2F7;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
</head>
<body>

        <h1>

        </h1>
        <p>Gerador dinâmico • Mercado Pago</p>
    </div>
    <div class="content">

            (O comprador insere o valor automaticamente ao escanear com o app do banco ou Mercado Pago)

        <div class="input-group">

                <span class="currency-symbol">R$</span>
                <input type="number" id="amount" value="25.00" step="0.01" min="0.50" placeholder="Ex: 49,90">
            </div>
        </div>

        <button id="generateBtn">

                <!-- QR code será renderizado aqui -->
            </div>
