<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #produtos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .produto {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .produto img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: lime;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Minha Loja 😎</h1>

  <div id="produtos"></div>

  <script src="script.js"></script>

</body>
</html>
