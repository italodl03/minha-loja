<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🛍️ Minha Vitrine</h1>
        <p>Confira nossos produtos atualizados</p>
    </header>

    <main class="vitrine" id="vitrine-produtos">
        <!-- Os produtos do JSON vão aparecer aqui dentro -->
    </main>

    <script>
        // Carrega o arquivo JSON e renderiza os produtos
        fetch('produtos.json')
            .then(response => response.json())
            .then(produtos => {
                const vitrine = document.getElementById('vitrine-produtos');
                
                produtos.forEach(produto => {
                    const card = document.createElement('div');
                    card.classList.add('produto-card');
                    
                    card.innerHTML = `
                        <img src="${produto.imagem}" alt="${produto.nome}">
                        <h3>${produto.nome}</h3>
                        <p class="preco">R$ ${produto.preco}</p>
                        <a href="${produto.link}" target="_blank" class="btn-comprar">Ver Detalhes</a>
                    `;
                    
                    vitrine.appendChild(card);
                });
            })
            .catch(error => console.error('Erro ao carregar os produtos:', error));
    </script>
</body>
</html>
